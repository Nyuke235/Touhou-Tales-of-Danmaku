services:
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: npm start
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules

  express:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: npm run express
    ports:
      - "9000:9000"
    volumes:
      - .:/app
      - /app/node_modules
